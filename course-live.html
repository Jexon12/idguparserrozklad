<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Розклад на день по курсах: групи, предмети, викладачі, аудиторії">
  <title>Course Live Day</title>
  <script>
    window.__loadTailwindFallback = function () {
      if (window.__tailwindFallbackLoaded) return;
      window.__tailwindFallbackLoaded = true;
      var s = document.createElement('script');
      s.src = 'https://cdn.tailwindcss.com/3.4.1';
      document.head.appendChild(s);
    };
  </script>
  <link rel="stylesheet" href="css/tailwind.generated.css?v=20260409-2" onerror="window.__loadTailwindFallback()">
  <link rel="stylesheet" href="css/styles.css?v=20260410-1">
  <link rel="stylesheet" href="css/ui-kit.css?v=20260412-1">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-3 md:p-6 space-y-4">
    <header class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <div>
          <h1 class="text-2xl md:text-3xl font-black text-sky-700 dark:text-sky-300">Розклад Курсу · День</h1>
          <p class="text-xs text-gray-500 mt-1">Кілька факультетів/форм/курсів, поточні пари та фільтри</p>
        </div>
        <div class="flex gap-2">
          <a href="/index.html?desktop=1" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold">Desktop</a>
          <a href="/index2.html?mobile=1" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold">Mobile</a>
        </div>
      </div>
    </header>

    <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 space-y-3">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
        <input id="date" type="date" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
        <button id="refreshBtn" class="px-3 py-2 rounded-xl bg-sky-600 hover:bg-sky-700 text-white font-bold">Оновити зараз</button>
        <select id="viewMode" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
          <option value="cards">Картки</option>
          <option value="table">Таблиця</option>
        </select>
        <input id="search" type="text" placeholder="Пошук група/викладач/аудиторія" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="rounded-xl border dark:border-gray-700 p-3">
          <div class="font-bold mb-2">Факультети</div>
          <div class="max-h-44 overflow-y-auto space-y-1" id="facultiesBox"></div>
        </div>
        <div class="rounded-xl border dark:border-gray-700 p-3">
          <div class="font-bold mb-2">Форми навчання</div>
          <div class="max-h-44 overflow-y-auto space-y-1" id="formsBox"></div>
        </div>
        <div class="rounded-xl border dark:border-gray-700 p-3">
          <div class="font-bold mb-2">Курси</div>
          <div class="max-h-44 overflow-y-auto space-y-1" id="coursesBox"></div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <label class="inline-flex items-center gap-2"><input id="onlyNow" type="checkbox"> <span class="text-sm">Тільки з поточною парою</span></label>
        <label class="inline-flex items-center gap-2"><input id="onlyOffline" type="checkbox"> <span class="text-sm">Тільки офлайн</span></label>
        <div id="meta" class="text-sm text-gray-500">Готово</div>
      </div>
    </section>

    <section id="cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></section>

    <section id="tableWrap" class="bg-white dark:bg-gray-800 rounded-2xl shadow overflow-x-auto hidden">
      <table class="min-w-full text-sm">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-2 py-2 text-left">Група</th>
            <th class="px-2 py-2 text-left">Предмет</th>
            <th class="px-2 py-2 text-left">Викладач</th>
            <th class="px-2 py-2 text-left">Аудиторія</th>
            <th class="px-2 py-2 text-left">Час</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>
  </div>

  <script src="js/course-live.js?v=20260430-1"></script>
</body>
</html>
