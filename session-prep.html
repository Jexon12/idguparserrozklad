<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Формування таблиці для сесії: предмет, група, викладачі">
    <title>Session Prep Builder</title>
    <script>
        window.__loadTailwindFallback = function () {
            if (window.__tailwindFallbackLoaded) return;
            window.__tailwindFallbackLoaded = true;
            var s = document.createElement('script');
            s.src = 'https://cdn.tailwindcss.com/3.4.1';
            document.head.appendChild(s);
        };
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/tailwind.generated.css?v=20260409-2" onerror="window.__loadTailwindFallback()">
    <link rel="stylesheet" href="css/styles.css?v=20260410-1">
    <link rel="stylesheet" href="css/ui-kit.css?v=20260412-1">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-3 md:p-6 space-y-4">
        <header class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
            <div class="flex items-center justify-between gap-2 flex-wrap">
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-indigo-700 dark:text-indigo-300">Session Prep Builder</h1>
                    <p class="text-xs text-gray-500 mt-1">Таблиця: Предмет · Група · Викладачі</p>
                </div>
                <div class="flex gap-2">
                    <a href="/index.html?desktop=1" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold">Desktop</a>
                    <a href="/session.html" class="px-3 py-2 rounded-lg bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300 text-xs font-bold">Session</a>
                </div>
            </div>
        </header>

        <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                <select id="facultySelect" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700"></select>
                <select id="eduFormSelect" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700"></select>
                <input id="startDate" type="date" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                <input id="endDate" type="date" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="rounded-xl border dark:border-gray-700 p-3">
                    <div class="font-bold mb-2">Курси</div>
                    <div class="flex gap-2 mb-2">
                        <button id="selectAllCourses" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700">Усі</button>
                        <button id="clearCourses" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700">Очистити</button>
                    </div>
                    <div id="coursesBox" class="max-h-44 overflow-auto space-y-1"></div>
                </div>
                <div class="rounded-xl border dark:border-gray-700 p-3">
                    <div class="font-bold mb-2">Групи</div>
                    <div class="flex gap-2 mb-2">
                        <button id="selectAllGroups" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700">Усі</button>
                        <button id="clearGroups" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700">Очистити</button>
                    </div>
                    <div id="groupsBox" class="max-h-44 overflow-auto space-y-1"></div>
                </div>
                <div class="rounded-xl border dark:border-gray-700 p-3">
                    <div class="font-bold mb-2">Викладачі (фільтр)</div>
                    <div class="flex gap-2 mb-2">
                        <button id="selectAllTeachers" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700">Усі</button>
                        <button id="clearTeachers" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700">Очистити</button>
                    </div>
                    <div id="teachersBox" class="max-h-44 overflow-auto space-y-1"></div>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 items-center">
                <button id="buildBtn" class="px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm">Сформувати таблицю</button>
                <button id="copyBtn" class="px-4 py-2 rounded-xl bg-sky-600 hover:bg-sky-700 text-white font-bold text-sm">Скопіювати таблицю</button>
                <button id="excelBtn" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm">Експорт в Excel</button>
                <select id="groupFilter" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700 text-sm"></select>
                <input id="searchInput" type="text" placeholder="Пошук по предмету/групі/викладачу..." class="min-w-[280px] rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700 text-sm">
                <span id="loadingBadge" class="hidden px-3 py-2 rounded-lg bg-amber-100 text-amber-700 text-xs font-bold">Завантаження...</span>
            </div>

            <div id="errorBox" class="hidden p-2 rounded bg-red-100 text-red-700 text-sm"></div>
            <div class="text-sm text-gray-600 dark:text-gray-300">Записів: <span id="countLabel" class="font-bold">0</span></div>
        </section>

        <section class="bg-white dark:bg-gray-800 rounded-2xl shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-50 dark:bg-gray-700">
                        <tr>
                            <th class="px-3 py-2 text-left">№</th>
                            <th class="px-3 py-2 text-left">Предмет</th>
                            <th class="px-3 py-2 text-left">Група</th>
                            <th class="px-3 py-2 text-left">Викладачі</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/session-prep.js?v=20260430-1"></script>
</body>
</html>
