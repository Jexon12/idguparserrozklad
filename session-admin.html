<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Адмін-панель завантаження файлів сесії">
    <title>Session Admin</title>
    <script>
        window.__loadTailwindFallback = function () {
            if (window.__tailwindFallbackLoaded) return;
            window.__tailwindFallbackLoaded = true;
            var s = document.createElement('script');
            s.src = 'https://cdn.tailwindcss.com/3.4.1';
            document.head.appendChild(s);
        };
    </script>
    <script>
        if (localStorage.getItem('darkMode') === 'true' ||
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="css/tailwind.generated.css?v=20260409-2" onerror="window.__loadTailwindFallback()">
    <link rel="stylesheet" href="css/styles.css?v=20260410-1">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-3 md:p-6 space-y-4">
        <header class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
            <div class="flex items-center justify-between gap-2 flex-wrap">
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-emerald-700 dark:text-emerald-300">🛠 Session Admin</h1>
                    <p class="text-xs text-gray-500 mt-1">Завантажуйте Word (.docx), парсинг іде автоматично в браузері</p>
                </div>
                <div class="flex gap-2">
                    <a href="/session.html" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold">До таблиці сесії</a>
                    <a href="/index.html?desktop=1" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold">Desktop</a>
                </div>
            </div>
        </header>

        <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <input id="adminPassword" type="password" placeholder="ADMIN_PASSWORD" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                <input id="sessionTerm" type="text" placeholder="Назва сесії (напр. Зимова 2025-26)" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700 md:col-span-2">
            </div>
            <select id="studyForm" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                <option value="денна форма навчання">Денна форма навчання</option>
                <option value="заочна форма навчання">Заочна форма навчання</option>
            </select>
            <input id="docxFiles" type="file" accept=".docx" multiple class="block w-full text-sm">
            <div class="flex gap-2 flex-wrap">
                <button id="parseFiles" class="px-4 py-2 rounded-xl bg-amber-600 hover:bg-amber-700 text-white font-bold text-sm">1) Розпарсити файли</button>
                <button id="uploadData" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm">2) Завантажити в API</button>
            </div>
            <p id="adminStatus" class="text-sm text-gray-600 dark:text-gray-300"></p>
        </section>

        <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 space-y-2">
            <h2 class="font-bold">Підсумок парсингу</h2>
            <div class="text-sm text-gray-600 dark:text-gray-300">Файлів: <span id="fileCount" class="font-bold">0</span> · Записів: <span id="itemCount" class="font-bold">0</span></div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Групи:</div>
            <div id="groupPreview" class="flex flex-wrap gap-2"></div>
        </section>
    </div>

    <script src="js/session-admin.js?v=20260410-4"></script>
</body>
</html>
