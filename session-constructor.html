<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Конструктор сесії: DOCX шаблон + ручне редагування предметів і викладачів">
    <title>Session Constructor</title>
    <script>
        window.__loadTailwindFallback = function () {
            if (window.__tailwindFallbackLoaded) return;
            window.__tailwindFallbackLoaded = true;
            var s = document.createElement('script');
            s.src = 'https://cdn.tailwindcss.com/3.4.1';
            document.head.appendChild(s);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/tailwind.generated.css?v=20260409-2" onerror="window.__loadTailwindFallback()">
    <link rel="stylesheet" href="css/styles.css?v=20260410-1">
    <link rel="stylesheet" href="css/ui-kit.css?v=20260412-1">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-3 md:p-6 space-y-4">
        <header class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4">
            <div class="flex items-center justify-between gap-2 flex-wrap">
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-violet-700 dark:text-violet-300">Session Constructor</h1>
                    <p class="text-xs text-gray-500 mt-1">DOCX шаблон + ручні правки викладачів/предметів</p>
                </div>
                <div class="flex gap-2">
                    <a href="/session-admin.html" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold">Session Admin</a>
                    <a href="/session.html" class="px-3 py-2 rounded-lg bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300 text-xs font-bold">Session Table</a>
                </div>
            </div>
        </header>

        <section class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-2">
                <input id="adminPassword" type="password" placeholder="ADMIN_PASSWORD (для API upload)" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                <input id="adminActor" type="text" placeholder="Ваше ім'я (лог)" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                <input id="sessionTerm" type="text" placeholder="Назва сесії (напр. Зимова 2025-26)" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                <select id="studyForm" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
                    <option value="денна форма навчання">Денна форма навчання</option>
                    <option value="заочна форма навчання">Заочна форма навчання</option>
                </select>
                <input id="docxFiles" type="file" accept=".docx" multiple class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700">
            </div>

            <div class="flex gap-2 flex-wrap">
                <button id="parseBtn" class="px-4 py-2 rounded-xl bg-violet-600 hover:bg-violet-700 text-white font-bold text-sm">1) Розпарсити DOCX</button>
                <button id="normalizeBtn" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm">2) Нормалізувати/прибрати дублікати</button>
                <button id="addRowBtn" class="px-4 py-2 rounded-xl bg-amber-600 hover:bg-amber-700 text-white font-bold text-sm">+ Додати свій предмет</button>
                <button id="uploadBtn" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm">3) Завантажити в API</button>
                <button id="excelBtn" class="px-4 py-2 rounded-xl bg-green-600 hover:bg-green-700 text-white font-bold text-sm">Експорт Excel</button>
                <button id="copyBtn" class="px-4 py-2 rounded-xl bg-sky-600 hover:bg-sky-700 text-white font-bold text-sm">Скопіювати таблицю</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                <input id="searchInput" type="text" placeholder="Пошук по предмету/групі/викладачу..." class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700 text-sm">
                <select id="groupFilter" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700 text-sm"></select>
                <select id="teacherFilter" class="rounded-xl border dark:border-gray-600 p-2 bg-white dark:bg-gray-700 text-sm"></select>
                <div class="px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 text-sm">Записів: <span id="countLabel" class="font-bold">0</span></div>
            </div>

            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="h-full bg-violet-500 transition-all duration-200" style="width:0%"></div>
            </div>
            <div id="progressText" class="text-xs text-gray-500">Очікування файлів...</div>
            <div id="status" class="text-sm text-gray-600 dark:text-gray-300"></div>
            <div id="errorBox" class="hidden p-2 rounded bg-red-100 text-red-700 text-sm"></div>
        </section>

        <section class="bg-white dark:bg-gray-800 rounded-2xl shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-50 dark:bg-gray-700">
                        <tr>
                            <th class="px-2 py-2 text-left">№</th>
                            <th class="px-2 py-2 text-left">Предмет</th>
                            <th class="px-2 py-2 text-left">Група</th>
                            <th class="px-2 py-2 text-left">Викладачі</th>
                            <th class="px-2 py-2 text-left">Форма контролю</th>
                            <th class="px-2 py-2 text-left">Дія</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="js/session-constructor.js?v=20260430-1"></script>
</body>
</html>
